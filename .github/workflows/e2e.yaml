name: Contracts CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# The org's Actions policy is local_only (no marketplace actions), so
# checkout and toolchain setup are plain run: steps.
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      NODE_VERSION: 22.17.0
    steps:
      - name: Checkout
        run: |
          git init -q .
          git fetch -q --depth 1 "https://x-access-token:${{ github.token }}@github.com/${GITHUB_REPOSITORY}.git" "$GITHUB_SHA"
          git checkout -q FETCH_HEAD

      - name: Install Node ${{ env.NODE_VERSION }} + pnpm
        run: |
          curl -fsSL "https://nodejs.org/dist/v${NODE_VERSION}/node-v${NODE_VERSION}-linux-x64.tar.xz" \
            | sudo tar -xJ -C /usr/local --strip-components=1
          sudo corepack enable
          node --version && pnpm --version

      - name: Install Foundry (anvil)
        env:
          FOUNDRY_DIR: /home/runner/.foundry
        run: |
          curl -fsSL https://foundry.paradigm.xyz | bash
          "$FOUNDRY_DIR/bin/foundryup"
          echo "$FOUNDRY_DIR/bin" >> "$GITHUB_PATH"

      # @commertize/utils is a monorepo workspace dep used only by the runtime
      # export bundle (index.mts); contracts compile/test/deploy don't need it
      # and workspace: protocol cannot resolve in this standalone repo.
      - name: Strip workspace-only dependency
        run: npm pkg delete 'dependencies.@commertize/utils'

      - run: pnpm install --no-lockfile

      # TestnetValidation.ts self-skips via process.exit(0) and would end the
      # run early — list the unit suites explicitly (see README Development).
      - name: Unit tests
        run: >
          pnpm hardhat test
          test/SmokeTest.ts
          test/PropertyTokenSnapshot.ts
          test/ListingEscrowRefund.ts
          test/ListingEscrowDistribution.ts
          test/DividendVault.ts
          test/IdentitySync.ts
          test/CCIPCompliantPool.ts
          test/PropertyNavOracle.ts

      - name: Local E2E deployment validation
        run: pnpm test:e2e
